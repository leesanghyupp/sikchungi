<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="식충이 마스코트">
  <!-- 배경 그림자 -->
  <ellipse cx="120" cy="215" rx="65" ry="8" fill="#000000" opacity="0.12"/>

  <!-- 몸체 (동그란 식충이) -->
  <circle cx="120" cy="125" r="85" fill="#FF8C42"/>

  <!-- 몸체 하이라이트 -->
  <ellipse cx="95" cy="95" rx="22" ry="16" fill="#FFB07A" opacity="0.55"/>

  <!-- 양쪽 볼 홍조 -->
  <circle cx="55"  cy="135" r="11" fill="#FF6B9D" opacity="0.55"/>
  <circle cx="185" cy="135" r="11" fill="#FF6B9D" opacity="0.55"/>

  <!-- 왼쪽 눈 (반짝이) -->
  <circle cx="92"  cy="100" r="14" fill="#FFFFFF"/>
  <circle cx="94"  cy="102" r="8"  fill="#3D2817"/>
  <circle cx="97"  cy="99"  r="3"  fill="#FFFFFF"/>

  <!-- 오른쪽 눈 (반짝이) -->
  <circle cx="148" cy="100" r="14" fill="#FFFFFF"/>
  <circle cx="150" cy="102" r="8"  fill="#3D2817"/>
  <circle cx="153" cy="99"  r="3"  fill="#FFFFFF"/>

  <!-- 입 (벌어진 입) -->
  <path d="M 80 150 Q 120 195 160 150 Q 120 175 80 150 Z" fill="#3D2817"/>

  <!-- 혀 (입맛 다시는 느낌) -->
  <ellipse cx="120" cy="170" rx="22" ry="13" fill="#FF6B9D"/>
  <line x1="120" y1="160" x2="120" y2="180" stroke="#D14A7A" stroke-width="2" stroke-linecap="round"/>

  <!-- 머리 위 김 (음식 냄새 / 흥분 표시) -->
  <path d="M 95 35 Q 100 22 95 12" stroke="#B8B8B8" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 120 30 Q 115 18 120 8"  stroke="#B8B8B8" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 145 35 Q 150 22 145 12" stroke="#B8B8B8" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- 작은 팔 왼쪽 (음식 들고 흔드는 느낌) -->
  <ellipse cx="38"  cy="125" rx="14" ry="10" fill="#FF8C42" transform="rotate(-20 38 125)"/>
  <!-- 작은 팔 오른쪽 -->
  <ellipse cx="202" cy="125" rx="14" ry="10" fill="#FF8C42" transform="rotate(20 202 125)"/>
</svg>
